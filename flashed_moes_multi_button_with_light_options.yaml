blueprint:
  name: Flashed Moe's Zigbee Switch - Detached Mode - Extended - WITH Light Options
  author: jzxandy
  description: >
    ## 🔘 Toggle Light(s) with Button(s) and Sync LED Indicator(s)


    Control lights using one or more momentary toggle buttons and have indicator LEDs synchronised with the opposite state.  



    This blueprint supports optional settings to dial in specific brightness, transition (on and off), and RGB/RGBW/RGBWW colours for your light(s).

    - 🔁 Triggered if any of the "Button Toggle(s)" change from **released → press** (applicable to custom flashed Moe's light switches).

    - 💡 Toggles the `main_entity` (referred to below as "Light(s)") on/off.

    - 🔄 Optionally toggles an `alternating_entity` (e.g. LED indicator(s) on light switch button, referred to below as the "LED Indicator(s)") to the *inverse* of the state of your selected light(s)

    - ✅ Quick set-up, especially for applications where 3 or more buttons are intended to control the same light(s) and you want the LED Indicators on each button to be synced in some way.

    - 🔄 Reusable across different button groups and lights.


    [Info - contact - feedback](https://github.com/jzxandy/HA-Blueprints)



    ### 🔧 Device Compatibility


    This blueprint is made for use with Moe's Zigbee switches flashed with custom firmware and makes automating light controls in detached mode easier. Compatible Moe's zigbee switch models include:  

    - **TS0011** (1 gang - OTA FLASH COMPATIBLE)  

    - **TS0012** (2 gang - OTA FLASH COMPATIBLE)  

    - **TS0013** (3 gang - OTA FLASH COMPATIBLE)  

    - **TS0014** (4-gang - REQUIRES HARDWARE FLASHER)  


    These are no-neutral Tuya Zigbee switches and should be readily available for purchase on AliExpress.

   
    You can obtain the custom firmware for these switches (and other Tuya devices) thanks to Romasku [here](https://github.com/romasku/tuya-zigbee-switch).


    ### ⚙️ Zigbee2MQTT Setup Requirements:

    **For each button (referred to below as "Button Toggle(s)"):**  

    - `Switch x mode (Endpoint: switch_x)` - `MOMENTARY`  

    - `Switch x action mode (Endpoint: switch_x)` - `TOGGLE_SIMPLE`



    **For each relay that you want to supply constant power to your light(s):**  



    - `Switch x relay mode (Endpoint: switch_x)` - `LONG_PRESS` - (this allows you to manually toggle the relay in question, by long-pressing the corresponding physical button)

    - `State (Endpoint: relay_x)` - `ON`  

    - `Power-on behavior (Endpoint: relay_x)` - `ON`


    ### 🎨 RGBW / RGBWW Colour Format

    When using RGBW or RGBWW colour modes, enter values as a YAML list in the object input box.

    - **RGBW** example: `[255, 128, 0, 255]` *(red, green, blue, white)*

    - **RGBWW** example: `[255, 128, 0, 255, 200]` *(red, green, blue, cold white, warm white)*

  domain: automation
  input:
    buttons_switches:
      name: "Button(s) that you want to control your light(s)"
      icon: mdi:light-switch
      collapsed: true
      input:
        toggle_switch:
          name: Button(s)
          description: One or more flashed Moe's "switch press action switch" entity to control the lights. Each button in this list will control the light(s).
          selector:
            entity:
              domain: sensor
              multiple: true
    lights:
      name: "Light(s) that you want to control"
      icon: mdi:lightbulb-group
      collapsed: true
      input:
        main_entity:
          name: Light(s)
          description: Select the single or group light entity (or entities) that you want your button(s) to control simultaneously.
          selector:
            entity:
              domain: light
              multiple: true
    light_controls:
      name: "Brightness/Colour/Transition Controls - OPTIONAL"
      icon: mdi:lightbulb-on-outline
      collapsed: true
      input:
        include_light_control:
          name: Light Control Options
          description: Tick as applicable.
          default: []
          selector:
            select:
              multiple: true
              options:
                - label: Use Brightness
                  value: use_brightness
                - label: Use Transition
                  value: use_transition
        light_brightness:
          name: Brightness (%)
          description: Brightness applied when light is turned on by button toggles.
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: '%'
              mode: slider
        light_transition_on:
          name: Transition On (s)
          description: Duration for light(s) to go from "off" to maximum brightness.
          default: 1
          selector:
            number:
              min: 0
              max: 10
              step: 0.5
              unit_of_measurement: 's'
              mode: slider
        light_transition_off:
          name: Transition Off (s)
          description: Duration for light(s) to fully dim.
          default: 1
          selector:
            number:
              min: 0
              max: 30
              step: 1
              unit_of_measurement: 's'
              mode: slider
        include_light_colour_control:
          name: Light Colour Options
          # FIX #5: Clarified RGBW/RGBWW input format in description.
          # Full format guidance is also added to the blueprint description above.
          description: >
            Colour temperature for white light only, RGB for colours, RGBW or RGBWW for multiple colour/white channels.
            For RGBW/RGBWW, enter values as a YAML list in the object field — e.g. `[255, 128, 0, 255]`.
          default: disable_colour_control
          selector:
            select:
              options:
                - label: Use Colour Temperature
                  value: use_colour_temperature
                - label: Use RGB Colour
                  value: use_rgb_colour
                - label: Use RGBW Colour
                  value: use_rgbw_colour
                - label: Use RGBWW Colour
                  value: use_rgbww_colour
                - label: Disable Colour Control
                  value: disable_colour_control
        light_colour_temperature:
          name: Colour Temperature (Kelvin)
          description: Only works when "Use Colour Temperature" is selected.
          default: 5000
          selector:
            number:
              min: 2000
              max: 8000
              step: 100
              unit_of_measurement: 'K'
              mode: slider
        light_rgb_colour:
          name: RGB Colour
          description: Only works when "Use RGB Colour" is selected.
          default: [255, 255, 255]
          selector:
            color_rgb:
        light_rgbw_colour:
          name: RGBW Colour
          # FIX #5: Added explicit format guidance directly on the input field.
          description: "Only works when 'Use RGBW Colour' is selected. Enter as a YAML list: [R, G, B, W] — e.g. [255, 128, 0, 255]"
          default: [255, 255, 255, 255]
          selector:
            object:
        light_rgbww_colour:
          name: RGBWW Colour
          # FIX #5: Added explicit format guidance directly on the input field.
          description: "Only works when 'Use RGBWW Colour' is selected. Enter as a YAML list: [R, G, B, CW, WW] — e.g. [255, 128, 0, 255, 200]"
          default: [255, 255, 255, 255, 255]
          selector:
            object:
    led_indicators:
      name: "Switch Button LED Indicator(s) - OPTIONAL"
      icon: mdi:led-on
      collapsed: true
      input:
        alternating_entity:
          name: LED Indicator(s)
          description: Optional - Automatically sync LED indicator(s) to reflect the opposite state of your light(s).
          default: []
          selector:
            entity:
              domain: switch
              multiple: true
mode: single

variables:
  main_entity: !input main_entity
  alternating_entity: !input alternating_entity
  include_light_control: !input include_light_control
  light_brightness: !input light_brightness
  light_transition_on: !input light_transition_on
  light_transition_off: !input light_transition_off
  include_light_colour_control: !input include_light_colour_control
  light_colour_temperature: !input light_colour_temperature
  light_rgb_colour: !input light_rgb_colour
  light_rgbw_colour: !input light_rgbw_colour
  light_rgbww_colour: !input light_rgbww_colour
  toggle_switch: !input toggle_switch

  light_data: >
    {% set light = namespace(data={}) %}
    {% if 'use_transition' in include_light_control %}
      {% set light.data = dict(light.data, transition=light_transition_on) %}
    {% endif %}
    {% if 'use_brightness' in include_light_control %}
      {% set light.data = dict(light.data, brightness_pct=light_brightness) %}
    {% endif %}
    {% if include_light_colour_control == 'use_colour_temperature' %}
      {% set light.data = dict(light.data, color_temp_kelvin=light_colour_temperature) %}
    {% elif include_light_colour_control == 'use_rgb_colour' %}
      {% set light.data = dict(light.data, rgb_color=light_rgb_colour) %}
    {% elif include_light_colour_control == 'use_rgbw_colour' %}
      {% set light.data = dict(light.data, rgbw_color=light_rgbw_colour) %}
    {% elif include_light_colour_control == 'use_rgbww_colour' %}
      {% set light.data = dict(light.data, rgbww_color=light_rgbww_colour) %}
    {% endif %}
    {{ light.data }}

trigger:
  - platform: state
    entity_id: !input toggle_switch
    from: "released"
    to: "press"
    id: 'button_press'

  - platform: state
    entity_id: !input main_entity
    from: "off"
    to: "on"
    id: 'lights_turned_on'

  - platform: state
    entity_id: !input main_entity
    from: "on"
    to: "off"
    id: 'lights_turned_off'

action:
  - choose:
      # BUTTON PRESS TRIGGER
      - conditions:
          - condition: trigger
            id: 'button_press'
        sequence:
          - choose:
              # Some or all lights are on — turn them all off
              - conditions: "{{ expand(main_entity) | selectattr('state','eq','on') | list | count > 0 }}"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: !input main_entity
                    data:
                      transition: "{{ light_transition_off if 'use_transition' in include_light_control else 0 }}"
              # All lights are off — turn them on
              - conditions: "{{ expand(main_entity) | selectattr('state','eq','off') | list | count == expand(main_entity) | list | count }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input main_entity
                    data: "{{ light_data }}"
            # FIX #3: Added default fallback to handle unavailable/unknown light states gracefully.
            # If lights are unavailable, we do nothing and skip the LED update entirely.
            default: []

          # FIX #1 (LED polarity) + FIX #4 (guard on empty alternating_entity):
          # LEDs should be the INVERSE of the light state.
          # After turn_off: lights go off → LEDs should turn ON  (switch.turn_on)
          # After turn_on:  lights go on  → LEDs should turn OFF (switch.turn_off)
          # We re-evaluate light state after the toggle command to determine the new state.
          - choose:
              - conditions: "{{ alternating_entity != [] }}"
                sequence:
                  - choose:
                      # Lights are now ON (were all off, just turned on) → LEDs OFF
                      - conditions: "{{ expand(main_entity) | selectattr('state','eq','on') | list | count > 0 }}"
                        sequence:
                          - service: switch.turn_off
                            target:
                              entity_id: !input alternating_entity
                      # Lights are now OFF (were some/all on, just turned off) → LEDs ON
                      - conditions: "{{ expand(main_entity) | selectattr('state','eq','off') | list | count == expand(main_entity) | list | count }}"
                        sequence:
                          - service: switch.turn_on
                            target:
                              entity_id: !input alternating_entity
                    # FIX #3: If lights are unavailable/unknown, leave LEDs in their current state.
                    default: []

      # LIGHTS TURNED ON REMOTELY
      # FIX #2: Replaced multi-entity `condition: state` (which requires ALL buttons to be
      # "released") with a template condition that checks if ANY button is currently "press".
      # If any button is actively being pressed, this remote trigger is skipped to avoid
      # conflicting with the button_press path.
      # FIX #4: Added guard so this sequence is skipped when no LED entities are configured.
      - conditions:
          - condition: trigger
            id: 'lights_turned_on'
          - condition: template
            value_template: >
              {{ expand(toggle_switch) | selectattr('state','eq','press') | list | count == 0 }}
          - condition: template
            value_template: "{{ alternating_entity != [] }}"
        sequence:
          # Lights turned on remotely → LEDs OFF (inverse)
          - service: switch.turn_off
            target:
              entity_id: !input alternating_entity

      # LIGHTS TURNED OFF REMOTELY
      # FIX #2: Same fix as above — use template to check no buttons are actively pressed.
      # FIX #4: Added guard so this sequence is skipped when no LED entities are configured.
      - conditions:
          - condition: trigger
            id: 'lights_turned_off'
          - condition: template
            value_template: >
              {{ expand(toggle_switch) | selectattr('state','eq','press') | list | count == 0 }}
          - condition: template
            value_template: "{{ alternating_entity != [] }}"
        sequence:
          # Lights turned off remotely → LEDs ON (inverse)
          - service: switch.turn_on
            target:
              entity_id: !input alternating_entity
